<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cha er Bari — Owner Dashboard</title>

<style>
body{
  font-family:system-ui;
  background:#0f172a;
  color:white;
  margin:0;
  padding:20px;
  text-align:center;
}

.card{
  background:#111827;
  padding:20px;
  border-radius:16px;
  max-width:520px;
  margin:20px auto;
  box-shadow:0 10px 30px rgba(0,0,0,.4);
}

button{
  padding:14px 22px;
  border-radius:10px;
  border:none;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
  margin:6px;
}

.green{background:#22c55e;color:white;}
.blue{background:#3b82f6;color:white;}
.red{background:#ef4444;color:white;}

input{
  padding:12px;
  border-radius:10px;
  border:none;
  font-size:16px;
  width:90%;
  margin-top:8px;
}

pre{
  text-align:left;
  background:#020617;
  padding:16px;
  border-radius:12px;
  overflow:auto;
}
</style>
</head>

<body>

<h1>☕ Cha er Bari — Owner Dashboard</h1>

<div class="card">
<h3>📦 Stock Control</h3>

<input id="item" placeholder="Item name">
<input id="qty" type="number" placeholder="Quantity">

<br><br>

<button class="green" onclick="addStock()">Add / Update Stock</button>
<button class="blue" onclick="loadStock()">Load Stock</button>
<button class="red" onclick="clearLocal()">Clear Local Cache</button>
</div>

<div class="card">
<h3>📊 Cloud Data</h3>
<pre id="out">No data loaded</pre>
</div>

<script>

// ⭐ YOUR GOOGLE SCRIPT BACKEND
const API_URL = "https://script.google.com/macros/s/AKfycbx6gFmacoYe1sfKrDWUPakJe6rTXSL8DjOKl64zpZqZKLZmtJsFusJpuY3E3ntlQik7/exec";


// =====================
// LOCAL STORAGE
// =====================
let stock = JSON.parse(localStorage.getItem("ceb_stock") || "{}");

function saveLocal(){
  localStorage.setItem("ceb_stock", JSON.stringify(stock));
}


// =====================
// ADD / UPDATE STOCK
// =====================
async function addStock(){
  const item = document.getElementById("item").value.trim();
  const qty = parseInt(document.getElementById("qty").value);

  if(!item || !qty){
    alert("Enter item and quantity");
    return;
  }

  stock[item] = (stock[item] || 0) + qty;

  saveLocal();
  await saveCloud();

  alert("Saved & synced!");
}


// =====================
// SAVE TO CLOUD
// =====================
async function saveCloud(){
  await fetch(API_URL,{
    method:"POST",
    mode:"no-cors",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      type:"saveStock",
      stock
    })
  });
}


// =====================
// LOAD FROM CLOUD
// =====================
async function loadStock(){
  try{
    const res = await fetch(API_URL + "?type=loadStock");
    const data = await res.json();

    if(data.stock){
      stock = data.stock;
      saveLocal();
    }

    document.getElementById("out").textContent =
      JSON.stringify(stock, null, 2);

  }catch(e){
    alert("Cloud load failed");
  }
}


// =====================
// CLEAR LOCAL
// =====================
function clearLocal(){
  localStorage.removeItem("ceb_stock");
  stock = {};
  document.getElementById("out").textContent = "Local cache cleared";
}


// =====================
// AUTO LOAD ON START
// =====================
window.onload = loadStock;

</script>
</body>
</html>
